<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>TRACKING KOTA/KAB ASAL</title>

<style>

*{box-sizing:border-box}

body{

margin:0;
font-family:Segoe UI;

background:
radial-gradient(circle at top,#0f172a,#020617);

color:white;

display:flex;
justify-content:center;
align-items:center;

min-height:100vh;
padding:20px;

}

/* CARD */

.card{

width:100%;
max-width:800px;

padding:35px;

border-radius:25px;

background:rgba(15,23,42,0.9);

backdrop-filter:blur(20px);

box-shadow:
0 0 60px rgba(0,0,0,0.8),
inset 0 0 30px rgba(255,255,255,0.05);

}

/* TITLE */

h1{

text-align:center;
margin-bottom:25px;
font-size:28px;

}

/* STATS */

.stats{
display:none;
}

.stat{

background:#020617;

padding:12px;

border-radius:10px;

text-align:center;

font-size:13px;

border:1px solid #1e293b;

}

.stat b{
display:block;
font-size:18px;
margin-top:4px;
}

/* DROP AREA */

.drop{

border:2px dashed #334155;

padding:35px;

text-align:center;

border-radius:18px;

margin-bottom:20px;

cursor:pointer;

transition:.3s;

}

.drop:hover{

border-color:#22c55e;

background:rgba(34,197,94,0.1);

transform:scale(1.02);

}

/* BUTTONS */

.buttons{

display:flex;
gap:12px;
margin-bottom:20px;

}

button{

flex:1;

padding:14px;

border:none;

border-radius:12px;

font-weight:bold;

cursor:pointer;

transition:.3s;

}

/* START */

.start{

background:linear-gradient(45deg,#22c55e,#4ade80);

box-shadow:0 0 20px #22c55e;

}

.start:hover{

transform:scale(1.06);

}

/* DOWNLOAD */

.download{

background:linear-gradient(45deg,#f59e0b,#fbbf24);

box-shadow:0 0 20px #f59e0b;

}

.download:hover{

transform:scale(1.06);

}

/* PROGRESS */

.progress{
display:none;
}

.bar{

height:100%;

width:0%;

background:linear-gradient(
90deg,
#22c55e,
#4ade80,
#22c55e
);

background-size:200%;

animation:move 2s linear infinite;

transition:width .4s;

}

@keyframes move{

0%{background-position:0%}
100%{background-position:200%}

}

/* STATUS */

.status{

display:flex;
justify-content:center;
align-items:center;

font-size:28px;
font-weight:bold;

margin:25px 0;

text-align:center;

}

/* LOG */

#log{

margin-top:10px;

background:#020617;

height:320px;

overflow:auto;

padding:18px;

border-radius:12px;

font-family:monospace;

font-size:16px;

border:1px solid #1e293b;

display:flex;

flex-direction:column;

align-items:center;

justify-content:flex-start;

text-align:center;

}

/* MOBILE */

@media(max-width:650px){

.stats{
grid-template-columns:repeat(2,1fr);
}

.buttons{
flex-direction:column;
}

}

.stop{

background:linear-gradient(45deg,#ef4444,#f87171);

box-shadow:0 0 20px #ef4444;

}

.stop:hover{

transform:scale(1.06);

}

/* MATRIX EFFECT */

body::before{
content:"";
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
pointer-events:none;
z-index:-1;
background:radial-gradient(circle at center,#020617,#000);
}

/* LOG CENTER */

#log{
text-align:center;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
}

/* MATRIX CANVAS */

#matrix{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
z-index:-2;
}

</style>

</head>

<body>

<div class="card">

<h1>🚚 TRACKING KOTA/KAB ASAL</h1>

<div class="stats">

<div class="stat">TOTAL<b id="total">0</b></div>
<div class="stat">DONE<b id="done">0</b></div>
<div class="stat">SPEED<b id="speed">0/s</b></div>
<div class="stat">ETA<b id="eta">--</b></div>

</div>

<div class="drop" id="drop">

📂 Drag & Drop Excel File

<input type="file" id="file" hidden>

</div>

<div class="buttons">

<button class="start" onclick="run()">Start Tracking</button>

<button class="stop" onclick="togglePause()">Stop / Resume</button>

<button class="download" onclick="download()">Download Result</button>

</div>

<div class="status" style="display:none">
<span id="percent">0%</span>
</div>

<div class="progress">
<div class="bar" id="bar"></div>
</div>

<div id="log"></div>

</div>

<!-- POPUP SELESAI -->
<div id="finishBox" style="
display:none;
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
background:#020617;
padding:40px;
border-radius:20px;
text-align:center;
box-shadow:0 0 60px #22c55e;
z-index:999;
">

<div style="font-size:70px">🎉</div>

<h2>Tracking Selesai</h2>

<p>Semua data berhasil diproses</p>

</div>



<script>

let paused=false

let bar=document.getElementById("bar")
let percent=document.getElementById("percent")

let totalBox=document.getElementById("total")
let doneBox=document.getElementById("done")
let speedBox=document.getElementById("speed")
let etaBox=document.getElementById("eta")

let logBox=document.getElementById("log")

let total=0
let done=0
let startTime=0
let finished=false

/* SOUND */

function playFinish(){

let audio=new Audio("https://actions.google.com/sounds/v1/cartoon/clang_and_wobble.ogg")
audio.volume=1
audio.play()

}

/* SERVER LOG */

/* SERVER LOG */

let evt

function connectLogs(){

evt = new EventSource("/logs")

evt.onmessage=function(e){

if(paused) return

let msg=e.data

logBox.innerHTML+=msg+"<br><br>"
logBox.scrollTop=logBox.scrollHeight

/* TOTAL */

if(msg.startsWith("TOTAL:")){

total=parseInt(msg.split(":")[1])

totalBox.innerText=total

startTime=Date.now()

}

/* PROGRESS */

if(msg.startsWith("PROGRESS:")){

done=parseInt(msg.split(":")[1])

updateProgress()

}

}

/* AUTO RECONNECT */

evt.onerror=function(){

setTimeout(connectLogs,2000)

}

}

/* START CONNECT */

connectLogs()

/* UPDATE PROGRESS */

function updateProgress(){

if(total===0)return

let p=Math.floor((done/total)*100)

bar.style.width=p+"%"

percent.innerText=p+"%"

doneBox.innerText=done

/* TIME */

let elapsed=(Date.now()-startTime)/1000

if(elapsed<=0)return

/* SPEED */

let speed=done/elapsed

speedBox.innerText=speed.toFixed(2)+"/s"

/* ETA */

let remain=total-done

let eta=remain/speed

if(isFinite(eta)){

etaBox.innerText=Math.floor(eta)+"s"

}

/* FINISHED */

if(done>=total && !finished){

finished=true

playFinish()

document.getElementById("finishBox").style.display="block"

logBox.innerHTML+="<br>🎉 TRACKING SELESAI<br>"

}

}

/* RUN */

function run(){

done=0
finished=false

bar.style.width="0%"
percent.innerText="0%"

speedBox.innerText="0/s"
etaBox.innerText="--"

logBox.innerHTML=""

fetch("/run")

}

/* DOWNLOAD */

function download(){

window.location="/download"

}

/* DRAG DROP */

let drop=document.getElementById("drop")
let fileInput=document.getElementById("file")

drop.onclick=()=>fileInput.click()

drop.ondragover=e=>{
e.preventDefault()
drop.style.borderColor="#22c55e"
}

drop.ondragleave=e=>{
drop.style.borderColor="#334155"
}

drop.ondrop=e=>{

e.preventDefault()

fileInput.files=e.dataTransfer.files

drop.innerText="📂 "+e.dataTransfer.files[0].name

uploadFile()

}

fileInput.onchange=()=>{

drop.innerText="📂 "+fileInput.files[0].name

uploadFile()

}

/* UPLOAD */

function uploadFile(){

let file=fileInput.files[0]

let form=new FormData()

form.append("file",file)

fetch("/upload",{

method:"POST",
body:form

})
.then(r=>r.text())
.then(()=>{

logBox.innerHTML+="✅ File Uploaded<br>"

})

}

function togglePause(){

paused=!paused

if(paused){

logBox.innerHTML+="<br>⏸ Tracking dihentikan sementara<br>"

}else{

logBox.innerHTML+="<br>▶ Tracking dilanjutkan<br>"

}

}

/* REFRESH UI */

setInterval(()=>{

updateProgress()

},300)

</script>

</body>
</html>
