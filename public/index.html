<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>TRACKING KOTA ASAL</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>

body{
font-family:'Poppins',sans-serif;
background:#000;
color:#00ff9c;
text-align:center;
padding:30px;
overflow-x:hidden;
}

/* MATRIX BACKGROUND */

body::before{
content:"";
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background-image:
linear-gradient(rgba(0,255,150,0.08) 1px,transparent 1px),
linear-gradient(90deg,rgba(0,255,150,0.08) 1px,transparent 1px);
background-size:40px 40px;
z-index:-1;
animation:gridMove 20s linear infinite;
}

@keyframes gridMove{
0%{transform:translateY(0)}
100%{transform:translateY(40px)}
}

/* TITLE */

h1{
font-size:46px;
margin-bottom:20px;
color:#00ff9c;

text-shadow:
0 0 5px #00ff9c,
0 0 15px #00ff9c,
0 0 30px #00ff9c;

animation:titleGlow 2s infinite alternate;
}

@keyframes titleGlow{
from{filter:brightness(1)}
to{filter:brightness(1.4)}
}

/* HACKER BUTTON */

button{

padding:14px 28px;

border:1px solid #ff7a00;

border-radius:10px;

background:rgba(255,122,0,0.1);

color:#ff7a00;

font-size:15px;

cursor:pointer;

margin:10px;

letter-spacing:1px;

font-weight:600;

transition:0.25s;

box-shadow:
0 0 5px #ff7a00,
0 0 20px rgba(255,122,0,0.4);

}

button:hover{

background:#ff7a00;

color:white;

transform:scale(1.08);

box-shadow:
0 0 10px #ff7a00,
0 0 40px #ff7a00,
0 0 80px rgba(255,122,0,0.8);

}

/* FILE INPUT */

input[type=file]{

background:#020617;

color:#00ff9c;

border:1px solid #00ff9c;

padding:10px;

border-radius:8px;

}

/* TERMINAL LOG */

#log{

margin:30px auto;

background:#000;

padding:20px;

border-radius:10px;

height:350px;

overflow:auto;

text-align:left;

font-size:14px;

font-family:Courier,monospace;

border:1px solid #00ff9c;

box-shadow:
0 0 15px rgba(0,255,150,0.3),
inset 0 0 20px rgba(0,255,150,0.2);

/* TAMBAHAN AGAR TIDAK MELEBAR */

max-width:800px;
width:90%;

}

/* MATRIX TEXT EFFECT */

#log div{

color:#00ff9c;

text-shadow:0 0 4px #00ff9c;

animation:terminalText 0.4s ease;

}

@keyframes terminalText{

0%{
opacity:0;
transform:translateY(-8px);
}

100%{
opacity:1;
transform:translateY(0);
}

}

/* START */

.start{

font-size:22px;

font-weight:700;

color:#38bdf8;

margin-top:20px;

margin-bottom:20px;

text-shadow:
0 0 10px #38bdf8,
0 0 30px #38bdf8;

}

/* FINISH */

.finish{

font-size:22px;

font-weight:700;

color:#22c55e;

margin-top:20px;

text-shadow:
0 0 10px #22c55e,
0 0 30px #22c55e;

animation:finishPulse 1.5s infinite;

}

@keyframes finishPulse{

0%{text-shadow:0 0 10px #22c55e}

50%{text-shadow:0 0 40px #22c55e}

100%{text-shadow:0 0 10px #22c55e}

}

/* PROGRESS BOX */

.progress-box{

max-width:850px;

width:92%;

margin:25px auto;

background:#020617;

border-radius:10px;

padding:4px;

border:1px solid #00ff9c;

box-shadow:
0 0 10px rgba(0,255,150,0.3),
inset 0 0 10px rgba(0,255,150,0.2);

}

/* PROGRESS BAR */

.progress{

height:22px;

width:0%;

border-radius:10px;

position:relative;

overflow:visible;

background:linear-gradient(
90deg,
#00ff9c,
#22c55e,
#00ff9c
);

box-shadow:
0 0 10px #00ff9c,
0 0 20px #00ff9c,
0 0 40px rgba(0,255,150,0.6);

transition:width 0.3s;

}



/* BOLA API */

.progress::before{

content:"";

position:absolute;

right:-12px;

top:50%;

transform:translateY(-50%);

width:20px;

height:20px;

border-radius:50%;

background:radial-gradient(circle,#fff,#ff7a00,#ff3b00);

box-shadow:
0 0 10px #ff7a00,
0 0 20px #ff7a00,
0 0 40px #ff3b00,
0 0 60px rgba(255,80,0,0.9);

animation:fireMove 0.5s linear infinite alternate;

}

/* NYALA API */

.progress::after{

content:"";

position:absolute;

right:-22px;

top:50%;

transform:translateY(-50%);

width:40px;

height:12px;

background:linear-gradient(
90deg,
rgba(255,140,0,0.8),
rgba(255,80,0,0.6),
transparent
);

filter:blur(6px);

animation:flameTrail 0.4s infinite alternate;

}

/* GERAK API */

@keyframes fireMove{

0%{
transform:translateY(-50%) scale(1);
}

100%{
transform:translateY(-50%) scale(1.15);
}

}

/* EKOR API */

@keyframes flameTrail{

0%{
opacity:0.5;
}

100%{
opacity:1;
}

}

/* SPEED EFFECT */

.progress::after{

content:"";

position:absolute;

top:0;

left:-100%;

width:100%;

height:100%;

background:linear-gradient(
120deg,
transparent,
rgba(255,255,255,0.7),
transparent
);

animation:speed 1.2s infinite;

}

@keyframes speed{

0%{left:-100%}

100%{left:120%}

}

/* SCROLLBAR */

#log::-webkit-scrollbar{
width:6px;
}

#log::-webkit-scrollbar-thumb{
background:#00ff9c;
border-radius:10px;
}

/* MATRIX CANVAS */

#matrix{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
z-index:-1;
background:black;
}

/* STATUS PANEL */

.stats{

display:flex;

justify-content:center;

gap:30px;

margin-top:20px;

}

/* CARD */

.card{

background:#020617;

border:1px solid #00ff9c;

padding:15px 30px;

border-radius:10px;

box-shadow:
0 0 10px rgba(0,255,150,0.3),
inset 0 0 10px rgba(0,255,150,0.2);

font-family:Courier,monospace;

color:#00ff9c;

}

/* LABEL */

.label{

font-size:12px;

opacity:0.7;

margin-bottom:5px;

}

/* VALUE */

.card div:last-child{

font-size:22px;

font-weight:bold;

text-shadow:0 0 10px #00ff9c;

}

#speed{
display:none;
}

.card:nth-child(2){
display:none;
}

.stats{
display:none;
}

.terminal-frame{

max-width:820px;
width:92%;
margin:30px auto;
background:#020617;
border-radius:12px;
border:1px solid #00ff9c;

box-shadow:
0 0 20px rgba(0,255,150,0.3),
inset 0 0 25px rgba(0,255,150,0.15);

overflow:hidden;

}

.terminal-header{

background:#020617;
padding:10px 15px;

border-bottom:1px solid rgba(0,255,150,0.2);

display:flex;
align-items:center;
gap:10px;

font-family:monospace;

}

.dot{
width:10px;
height:10px;
border-radius:50%;
display:inline-block;
}

.red{background:#ff5f56;}
.yellow{background:#ffbd2e;}
.green{background:#27c93f;}

.title{

margin-left:10px;
font-size:12px;
opacity:0.7;
color:#00ff9c;

}

/* TERMINAL FRAME */

.terminal-frame{

max-width:850px;
width:92%;

margin:30px auto;

background:#020617;

border-radius:12px;

border:1px solid #00ff9c;

box-shadow:
0 0 25px rgba(0,255,150,0.35),
inset 0 0 20px rgba(0,255,150,0.2);

overflow:hidden;

}

/* HEADER */

.terminal-header{

background:#020617;

padding:10px 15px;

border-bottom:1px solid rgba(0,255,150,0.25);

display:flex;

align-items:center;

gap:8px;

font-family:monospace;

}

/* TERMINAL DOT */

.dot{

width:10px;

height:10px;

border-radius:50%;

display:inline-block;

}

.red{background:#ff5f56;}
.yellow{background:#ffbd2e;}
.green{background:#27c93f;}

/* TERMINAL TITLE */

.title{

margin-left:10px;

font-size:12px;

opacity:0.7;

color:#00ff9c;

letter-spacing:1px;

}

/* LOG AREA */

#log{

height:350px;

overflow:auto;

padding:20px;

background:black;

font-family:Courier,monospace;

font-size:14px;

}

/* SCAN LINE EFFECT */

#log::after{

content:"";

position:absolute;

width:100%;

height:2px;

background:rgba(0,255,150,0.2);

animation:scan 4s linear infinite;

}

@keyframes scan{

0%{top:0}

100%{top:100%}

}

.controls{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:10px;
margin-top:15px;
}

/* ========================= */
/* RESPONSIVE MOBILE */
/* ========================= */

@media (max-width:768px){

h1{
font-size:28px;
}

button{
width:100%;
font-size:14px;
padding:12px;
}

input[type=file]{
width:100%;
}

.progress-box{
width:95%;
}

.terminal-frame{
width:95%;
}

#log{
height:250px;
font-size:12px;
padding:15px;
}

.start{
font-size:18px;
}

.finish{
font-size:18px;
}

.stats{
flex-direction:column;
gap:10px;
}

.card{
width:100%;
}

}

/* MODAL */
.modal{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.8);
  display:none;
  justify-content:center;
  align-items:center;
  z-index:9999;
}

.modal-content{
  background:linear-gradient(145deg, #020617, #01140f);
  border:2px solid #00ff9c;
  padding:30px 40px;
  border-radius:15px;
  text-align:center;
  color:#00ff9c;
  font-family:'Poppins', sans-serif;
  box-shadow: 0 0 20px #00ff9c, 0 0 40px rgba(0,255,150,0.3);
  animation:modalPop 0.4s ease;
}

@keyframes modalPop{
  0%{transform:scale(0.8);opacity:0;}
  100%{transform:scale(1);opacity:1;}
}

.modal-content h2{
  font-size:24px;
  margin-bottom:15px;
  text-shadow:0 0 8px #00ff9c, 0 0 20px #22c55e;
}

.modal-buttons button{
  padding:10px 25px;
  margin:10px;
  border-radius:10px;
  border:1px solid #00ff9c;
  background:rgba(0,255,156,0.1);
  color:#00ff9c;
  font-weight:600;
  cursor:pointer;
  transition:0.25s;
  box-shadow:0 0 5px #00ff9c,0 0 15px rgba(0,255,150,0.4);
}

.modal-buttons button:hover{
  background:#00ff9c;
  color:#000;
  transform:scale(1.05);
  box-shadow:0 0 15px #00ff9c,0 0 30px #22c55e;
}

</style>
</head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<body>
<canvas id="matrix"></canvas>
<h1>📦 TRACKING KOTA ASAL</h1>

<input type="file" id="file">
<br>
<div class="controls">
<button onclick="upload()">Upload Excel</button>
<button onclick="run()">Start Tracking</button>
<button onclick="download()">Download Hasil</button>
</div>
<div class="stats">

<div class="city-stats card">
    <div class="label">TRACKED PER KOTA</div>
    <div id="cityList"></div>
</div>

<div class="card">
<div class="label">TOTAL TRACKED</div>
<div id="total">0</div>
</div>

<div class="card">
<div class="label">SPEED / SEC</div>
<div id="speed">0</div>
</div>

</div>

<div class="progress-box">
<div class="progress" id="progress"></div>
</div>

<div class="terminal-frame">

<div class="terminal-header">
<span class="dot red"></span>
<span class="dot yellow"></span>
<span class="dot green"></span>
<span class="title">spx-tracking-terminal</span>
</div>

<div id="log"></div>

</div>

<audio id="doneSound">
<source src="https://actions.google.com/sounds/v1/cartoon/clang_and_wobble.ogg">
</audio>

<!-- CONFIRM MODAL -->
<div id="confirmModal" class="modal">
  <div class="modal-content">
    <h2>📦 Yakin file ini yang mau di-tracking?</h2>
    <p id="fileNameDisplay"></p>
    <div class="modal-buttons">
      <button onclick="confirmFile()">Yakin</button>
      <button onclick="closeModal()">Batal</button>
    </div>
  </div>
</div>

<script>

const logBox = document.getElementById("log");
const progress = document.getElementById("progress");

let percent = 0;
let totalTracked = 0;
let startTime = Date.now();

const cityCount = {}; // Menyimpan jumlah tracking per kota

function addLog(msg) {

    if(msg.includes("Memulai tracking")){
        logBox.innerHTML += `<div class="start">🚀 ${msg}</div>`;
        percent = 0;
        progress.style.width="5%";
        totalTracked = 0; // reset
        for (let key in cityCount) delete cityCount[key]; // reset kota
    }
    else if(msg.includes("Tracking selesai")){
        logBox.innerHTML += `<div class="finish">✅ ${msg}</div>`;
        progress.style.width="100%";
        document.getElementById("doneSound").play();
        updateCityStats();
    }
    else{
        logBox.innerHTML += `<div>📦 ${msg}</div>`;

        if(msg.includes("Tracking:")){
    totalTracked++;
    document.getElementById("total").innerText = totalTracked;

    let elapsed = (Date.now() - startTime) / 1000;
    let speed = (totalTracked / elapsed).toFixed(2);
    document.getElementById("speed").innerText = speed;

    // Ambil nama kota dari log
    let match = msg.match(/Tracking:\s*(.+)/);
    if(match){
        let city = match[1].trim();
        if(cityCount[city]){
            cityCount[city]++;
        } else {
            cityCount[city] = 1;
        }
        updateCityStats();
    }
}

        percent += 5;
        if(percent<95){
            progress.style.width = percent+"%";
        }
    }

    logBox.scrollTop = logBox.scrollHeight;
}

const evtSource = new EventSource("/logs");

evtSource.onmessage = function(event){
addLog(event.data);
};

function upload(){

let file = document.getElementById("file").files[0];
let form = new FormData();
form.append("file",file);

fetch("/upload",{method:"POST",body:form})
.then(res=>res.text())
.then(alert);

}

function run(){
fetch("/run");
}

function download(){
window.location="/download";
}

const canvas = document.getElementById("matrix");
const ctx = canvas.getContext("2d");

canvas.height = window.innerHeight;
canvas.width = window.innerWidth;

window.addEventListener("resize", function(){
    canvas.height = window.innerHeight;
    canvas.width = window.innerWidth;
    // update jumlah kolom sesuai ukuran baru
    columns = canvas.width / font_size;
    for(let x = 0; x < columns; x++){
        drops[x] = 1;
    }
});

const letters = "01SPXTRACKINGHACKER";
const matrix = letters.split("");

const font_size = 14;
const columns = canvas.width/font_size;

const drops = [];

for(let x = 0; x < columns; x++)
drops[x] = 1;

function draw(){

ctx.fillStyle = "rgba(0,0,0,0.05)";
ctx.fillRect(0,0,canvas.width,canvas.height);

ctx.fillStyle = "#00ff9c";
ctx.font = font_size + "px monospace";

for(let i=0;i<drops.length;i++){

const text = matrix[Math.floor(Math.random()*matrix.length)];

ctx.fillText(text,i*font_size,drops[i]*font_size);

if(drops[i]*font_size > canvas.height && Math.random() > 0.975)
drops[i] = 0;

drops[i]++;

}

}

setInterval(draw,35);

function updateCityStats() {
    const cityListDiv = document.getElementById("cityList");
    cityListDiv.innerHTML = "";

    for(let city in cityCount){
        cityListDiv.innerHTML += `<div>📍 ${city}: ${cityCount[city]}</div>`;
    }
}


const modal = document.getElementById("confirmModal");
const fileInput = document.getElementById("file");

fileInput.addEventListener("change", function(){
  if(fileInput.files.length > 0){
    document.getElementById("fileNameDisplay").innerText = fileInput.files[0].name;
    modal.style.display = "flex";
  }
});

function closeModal(){
  modal.style.display = "none";
  fileInput.value = ""; // reset file input
}

function confirmFile(){
  modal.style.display = "none";
  alert("File siap di-tracking!");
  // Jika mau, bisa langsung panggil upload() di sini
  // upload();
}

</script>

</body>
</html>
